name: Test dev-latest snapshot

on:
  workflow_dispatch:
  push:
    branches: [esgvoc_dev]
  pull_request:
    branches: [esgvoc_dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: ./.github/actions/setup-esgvoc

      - name: Test cordex-cmip6 build
        env:
          BRANCH: ${{ github.event.pull_request.head.ref || github.head_ref || github.ref_name }}
          REPO: ${{ github.event.pull_request.head.repo.full_name }}
        run: |
          REPO_FLAG=""
          if [ -n "$REPO" ]; then
            REPO_FLAG="--repo $REPO"
          fi
          esgvoc test run cordex-cmip6 $REPO_FLAG --branch "$BRANCH" --universe-branch esgvoc_dev

      - name: Print publish command
        run: |
          echo "============================================"
          echo "  Test passed! To publish, run manually:"
          echo ""
          echo "  gh workflow run publish.yml \\"
          echo "    -R WCRP-CMIP/esgvoc_registry \\"
          echo "    -f project_id=cordex-cmip6 \\"
          echo "    -f bump_type=dev-latest \\"
          echo "    -f project_repo=WCRP-CORDEX/cordex-cmip6-cv"
          echo "============================================"
